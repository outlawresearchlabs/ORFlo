version: '3.8'

services:
  # Claude Flow main service
  outlaw-flow:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    image: outlaw-flow:latest
    container_name: outlaw-flow
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OUTLAW_FLOW_HOME=/home/claude/.outlaw-flow
      - MCP_SERVER_URL=http://mcp-server:3001
    volumes:
      - outlaw-flow-data:/home/claude/.outlaw-flow
      - ../../workspace:/workspace
    networks:
      - outlaw-flow-network
    command: ["start", "--mode", "server"]
    ports:
      - "3000:3000"

  # MCP Server for Claude Flow
  mcp-server:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    image: outlaw-flow:latest
    container_name: outlaw-flow-mcp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MCP_MODE=server
      - MCP_PORT=3001
    volumes:
      - mcp-data:/home/claude/.mcp
    networks:
      - outlaw-flow-network
    command: ["mcp", "start", "--port", "3001"]
    ports:
      - "3001:3001"

  # ruv-swarm integration
  ruv-swarm:
    image: node:20-alpine
    container_name: ruv-swarm
    working_dir: /app
    environment:
      - NODE_ENV=production
      - SWARM_MODE=distributed
      - OUTLAW_FLOW_URL=http://outlaw-flow:3000
    volumes:
      - ../../ruv-swarm:/app
      - swarm-data:/data
    networks:
      - outlaw-flow-network
    command: ["npx", "ruv-swarm", "mcp", "start"]
    depends_on:
      - outlaw-flow
      - mcp-server

  # Development environment
  dev:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: builder
    image: outlaw-flow:dev
    container_name: outlaw-flow-dev
    environment:
      - NODE_ENV=development
    volumes:
      - ../..:/app
      - /app/node_modules
    networks:
      - outlaw-flow-network
    command: ["bash"]
    stdin_open: true
    tty: true

  # Test runner
  test:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: builder
    image: outlaw-flow:test
    container_name: outlaw-flow-test
    environment:
      - NODE_ENV=test
      - CI=true
    volumes:
      - ../..:/app
      - /app/node_modules
    networks:
      - outlaw-flow-network
    command: ["npm", "test"]

volumes:
  outlaw-flow-data:
    driver: local
  mcp-data:
    driver: local
  swarm-data:
    driver: local

networks:
  outlaw-flow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16